<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 대리점 단가 대시보드</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#f4f6f9;--bg2:#fff;--bg3:#f0f2f6;--border:#e3e7ef;--border2:#d1d8e5;
  --text:#1a202c;--text2:#4a5568;--text3:#9aa5b4;
  --blue:#2563eb;--blue-lt:#eff4ff;--blue-bd:#bfdbfe;
  --green:#16a34a;--grn-lt:#f0fdf4;--grn-bd:#bbf7d0;
  --orange:#ea580c;--ora-lt:#fff7ed;--ora-bd:#fed7aa;
  --purple:#7c3aed;--pur-lt:#f5f3ff;--pur-bd:#ddd6fe;
  --teal:#0d9488;--tea-lt:#f0fdfa;--tea-bd:#99f6e4;
  --yellow:#b45309;--yel-lt:#fffbeb;--yel-bd:#fde68a;--yel-hi:#fef3c7;--yel-tx:#92400e;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.hdr{background:#fff;border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;gap:12px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.06);z-index:200}
.hdr-icon{width:32px;height:32px;background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.hdr-title{font-size:15px;font-weight:700;letter-spacing:-.3px}
.hdr-sub{font-size:11px;color:var(--text3)}
.hdr-spacer{flex:1}
.hdr-chip{background:var(--blue-lt);border:1px solid var(--blue-bd);border-radius:6px;padding:4px 12px;font-size:12px;font-weight:600;color:var(--blue);font-family:'JetBrains Mono',monospace}
.hdr-date{font-size:11px;color:var(--text3);white-space:nowrap}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:175px;min-width:175px;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-scroll{overflow-y:auto;flex:1;padding:16px 0 20px}
.sb-scroll::-webkit-scrollbar{width:3px}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.sb-label{font-size:9.5px;font-weight:700;letter-spacing:1.3px;color:var(--text3);text-transform:uppercase;padding:6px 14px 5px}
.sb-item{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;cursor:pointer;font-size:13px;color:var(--text2);border-left:3px solid transparent;transition:all .12s;user-select:none}
.sb-item:hover{background:var(--bg3);color:var(--text)}
.sb-item.on{background:var(--blue-lt);color:var(--blue);border-left-color:var(--blue);font-weight:600}
.sb-cnt{font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:1px 7px;color:var(--text3)}
.sb-item.on .sb-cnt{background:#dbeafe;border-color:var(--blue-bd);color:var(--blue)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.toolbar{background:#fff;border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.srch{position:relative;min-width:200px;max-width:300px;flex:1}
.srch-ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
.srch input{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:8px;padding:7px 28px 7px 32px;color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .15s,background .15s}
.srch input:focus{border-color:var(--blue);background:#fff}
.srch input::placeholder{color:var(--text3)}
.srch-x{position:absolute;right:8px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:10px;cursor:pointer;background:var(--border2);border-radius:50%;width:16px;height:16px;display:none;align-items:center;justify-content:center}
.fsel{background:var(--bg3);border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text2);font-size:12.5px;font-family:'Noto Sans KR',sans-serif;outline:none;cursor:pointer;max-width:130px}
.fsel:focus{border-color:var(--blue)}
.grade-group{display:flex;align-items:center;gap:2px;background:var(--bg3);border:1.5px solid var(--border);border-radius:8px;padding:3px;flex-shrink:0}
.grade-group label{font-size:10px;color:var(--text3);padding:0 5px 0 2px;white-space:nowrap}
.grade-btn{padding:4px 8px;border-radius:5px;border:none;background:transparent;color:var(--text2);font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .12s;white-space:nowrap}
.grade-btn:hover{background:#fff;color:var(--text)}
.grade-btn.on{background:#fff;color:var(--blue);font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.grade-btn.on.g4{color:var(--yellow)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.res-cnt{font-size:12px;color:var(--text3);white-space:nowrap}
.res-cnt b{color:var(--blue);font-weight:700}
.tbl-wrap{flex:1;overflow:auto}
.tbl-wrap::-webkit-scrollbar{width:5px;height:5px}
.tbl-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:12.5px}
thead{position:sticky;top:0;z-index:10}
th{background:var(--bg3);color:var(--text3);font-size:10.5px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;padding:9px 12px;text-align:left;border-bottom:2px solid var(--border2);white-space:nowrap;cursor:pointer;user-select:none;transition:color .1s}
th:hover{color:var(--text2)}
th.asc::after{content:" ↑";color:var(--blue)}
th.desc::after{content:" ↓";color:var(--blue)}
tbody tr{background:#fff;transition:background .08s}
tbody tr:hover{background:#f8faff}
td{padding:8px 12px;vertical-align:middle;border-bottom:1px solid var(--border)}
.mono{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2)}
.name-cell{max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.p-num{font-family:'JetBrains Mono',monospace;font-size:12px;white-space:nowrap;color:var(--text2)}
.p-del{color:var(--green);font-weight:600;font-family:'JetBrains Mono',monospace;font-size:12px}
.p-na{color:var(--text3);font-size:11px}
.note-cell{font-size:11px;color:var(--text3);max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hi4{background:var(--yel-hi);color:var(--yel-tx);font-weight:700;border-radius:4px;padding:2px 6px;font-family:'JetBrains Mono',monospace;font-size:12px;white-space:nowrap}
.hi4-del{background:var(--yel-hi);color:#b45309;font-weight:700;border-radius:4px;padding:2px 6px;font-family:'JetBrains Mono',monospace;font-size:12px;white-space:nowrap}
.gbg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;white-space:nowrap}
.gbg-비급여{background:var(--ora-lt);color:var(--orange);border:1px solid var(--ora-bd)}
.gbg-급여{background:var(--grn-lt);color:var(--green);border:1px solid var(--grn-bd)}
.gbg-임플란트{background:var(--pur-lt);color:var(--purple);border:1px solid var(--pur-bd)}
.gbg-스텐트{background:var(--tea-lt);color:var(--teal);border:1px solid var(--tea-bd)}
.pm-tag{display:inline-flex;align-items:center;padding:2px 9px;border-radius:10px;font-size:11px;background:var(--blue-lt);color:var(--blue);border:1px solid var(--blue-bd);white-space:nowrap;font-weight:500}
.disc{display:inline-block;background:var(--yel-lt);color:var(--yellow);border:1px solid var(--yel-bd);border-radius:8px;padding:1px 7px;font-size:10.5px;font-family:'JetBrains Mono',monospace;white-space:nowrap}
.g-ind{display:inline-block;background:var(--yel-hi);color:var(--yel-tx);border:1px solid var(--yel-bd);border-radius:4px;padding:1px 6px;font-size:9.5px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-left:3px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:80px;color:var(--text3)}
.empty-ic{font-size:38px}
.empty-msg{font-size:13px}
.pager{background:#fff;border-top:1px solid var(--border);padding:9px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.pg-info{font-size:11.5px;color:var(--text3);white-space:nowrap}
.pg-info b{color:var(--text2);font-weight:600}
.pg-btns{display:flex;gap:3px;margin-left:auto}
.pg-btn{background:#fff;border:1.5px solid var(--border);border-radius:6px;padding:4px 9px;color:var(--text2);font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .12s;min-width:30px;text-align:center}
.pg-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt)}
.pg-btn.on{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:700}
.pg-btn:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.pg-dots{color:var(--text3);padding:0 2px;align-self:center}
.pp-sel{background:#fff;border:1.5px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--text2);font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer}
</style>
</head>

    </div>
    <div class="tbl-wrap" id="tblWrap">

          <th onclick="sortBy('n')">제품명</th>
          <th onclick="sortBy('s')">제품코드</th>

          <th onclick="sortBy('ex4')" style="text-align:right" id="th-ex">기준외가격 <span class="g-ind" id="gi-ex">4등급</span></th>
          <th onclick="sortBy('d')" style="text-align:center">할인율</th>
          <th>비고</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty" id="emptyMsg" style="display:none">
        <div class="empty-ic">🔎</div>
        <div class="empty-msg">검색 결과가 없습니다.</div>
      </div>
    </div>
    <div class="pager">
      <span class="pg-info" id="pgInfo"></span>
      <select class="pp-sel" id="ppSel" onchange="setPerPage()">
        <option value="50">50개씩</option>
        <option value="100">100개씩</option>
        <option value="200">200개씩</option>
      </select>
      <div class="pg-btns" id="pgBtns"></div>
    </div>
  </div>
</div>

function init(){
  DATA.forEach(function(r){r.cat=r.g==="비급여"?"비급여":"급여";});
  var c={비급여:0,급여:0};
  DATA.forEach(function(r){c[r.cat]++;});
  document.getElementById("sc-all").textContent=DATA.length;
  document.getElementById("sc-비급여").textContent=c["비급여"];
  document.getElementById("sc-급여").textContent=c["급여"];
  document.getElementById("totalChip").textContent="전체 "+DATA.length+"개";

    if(r.pm&&pms.indexOf(r.pm)<0)pms.push(r.pm);

    if(r.h2&&h2s.indexOf(r.h2)<0)h2s.push(r.h2);
  });
  pms.sort(function(a,b){return a.localeCompare(b,"ko");});h1s.sort();h2s.sort();
  function fill(id,arr){var el=document.getElementById(id);arr.forEach(function(v){var o=document.createElement("option");o.value=v;o.textContent=v;el.appendChild(o);});}
  fill("pmSel",pms);fill("h1Sel",h1s);fill("h2Sel",h2s);
  applyAll();
}
function esc(s){return(s||"").replace(/'/g,"&#39;").replace(/"/g,"&quot;");}
function pCell(v,hl,isDel){
  if(v===null||v===undefined||isNaN(v))return"<span class='p-na'>-</span>";
  var n=Math.round(v).toLocaleString("ko-KR");
  if(hl)return"<span class='"+(isDel?"hi4-del":"hi4")+"'>"+n+"</span>";
  return"<span class='"+(isDel?"p-del":"p-num")+"'>"+n+"</span>";
}
function discCell(d){if(d===null||d===undefined||isNaN(d))return"";return"<span class='disc'>-"+Math.round(d*100)+"%</span>";}
function gBadge(g){var c=g==="비급여"?"비급여":g==="급여"?"급여":g==="급여(임플란트)"?"임플란트":"스텐트";return"<span class='gbg gbg-"+c+"'>"+g+"</span>";}
function sb(el){document.querySelectorAll(".sb-item").forEach(function(i){i.classList.remove("on");});el.classList.add("on");sbKey=el.dataset.fk||"";sbVal=el.dataset.fv||"";pmVal="";h1Val="";h2Val="";document.getElementById("pmSel").value="";document.getElementById("h1Sel").value="";document.getElementById("h2Sel").value="";page=1;applyAll();}

function onFsel(){pmVal=document.getElementById("pmSel").value;h1Val=document.getElementById("h1Sel").value;h2Val=document.getElementById("h2Sel").value;page=1;applyAll();}
function setGrade(g){
  grade=g;
  document.querySelectorAll(".grade-btn").forEach(function(b){b.classList.remove("on","g4");});
  var btn=document.querySelector(".grade-btn[data-g='"+g+"']");
  if(btn){btn.classList.add("on");if(g===4)btn.classList.add("g4");}
  var lbl=g+"등급";
  document.getElementById("gi-p").textContent=lbl;
  document.getElementById("gi-dp").textContent=lbl;
  document.getElementById("gi-ex").textContent=lbl;
  document.getElementById("th-p").setAttribute("onclick","sortBy('p"+g+"')");
  document.getElementById("th-dp").setAttribute("onclick","sortBy('dp"+g+"')");
  document.getElementById("th-ex").setAttribute("onclick","sortBy('ex"+g+"')");
  page=1;renderTable();renderPager();
}
function applyAll(){
  filtered=DATA.filter(function(r){
    if(sbKey==="cat"&&r.cat!==sbVal)return false;
    if(pmVal&&r.pm!==pmVal)return false;
    if(h1Val&&r.h1!==h1Val)return false;
    if(h2Val&&r.h2!==h2Val)return false;
    if(srchQ){var hay=((r.n||"")+(r.s||"")+(r.h1||"")+(r.h2||"")+(r.h3||"")+(r.pm||"")).toLowerCase();if(hay.indexOf(srchQ)<0)return false;}
    return true;
  });
  if(sortCol){var col=sortCol,dir=sortDir;filtered.sort(function(a,b){var av=a[col],bv=b[col];if(av===null||av===undefined)av=dir>0?1e18:-1e18;if(bv===null||bv===undefined)bv=dir>0?1e18:-1e18;if(typeof av==="number"&&typeof bv==="number")return(av-bv)*dir;return String(av).localeCompare(String(bv),"ko")*dir;});}

}
function renderTable(){
  var start=(page-1)*perPage,slice=filtered.slice(start,start+perPage);
  var tbody=document.getElementById("tbody"),empty=document.getElementById("emptyMsg");
  if(!filtered.length){tbody.innerHTML="";empty.style.display="flex";return;}
  empty.style.display="none";
  var g=grade,is4=(g===4);
  tbody.innerHTML=slice.map(function(r){
    var np=(r.cat==="비급여");
    var pv=r["p"+(np?4:g)],dpv=r["dp"+(np?4:g)],exv=r["ex"+(np?4:g)];
    var hl=(!np&&is4);
    var sap=(r.s&&String(r.s)!=="nan"&&String(r.s)!=="-")?String(r.s):"-";
    var note=(r.note&&String(r.note)!=="nan")?r.note:"";
    return"<tr>"+
      "<td>"+gBadge(r.g)+"</td>"+
      "<td><span class='pm-tag'>"+(r.pm||"-")+"</span></td>"+
      "<td style='font-size:12px'>"+(r.h1||"-")+"</td>"+
      "<td style='font-size:12px;color:var(--text2)'>"+(r.h3||"-")+"</td>"+
      "<td class='name-cell' title='"+esc(r.n)+"'>"+(r.n||"-")+"</td>"+
      "<td class='mono'>"+sap+"</td>"+
      "<td style='text-align:right'>"+pCell(pv,hl,false)+"</td>"+
      "<td style='text-align:right'>"+pCell(dpv,hl,true)+"</td>"+
      "<td style='text-align:right'>"+pCell(exv,hl,false)+"</td>"+
      "<td style='text-align:center'>"+discCell(r.d)+"</td>"+
      "<td class='note-cell' title='"+esc(note)+"'>"+note+"</td>"+
      "</tr>";
  }).join("");
}
function renderPager(){
  var total=filtered.length,pages=Math.ceil(total/perPage);
  var s=(page-1)*perPage+1,e=Math.min(page*perPage,total);
  document.getElementById("pgInfo").innerHTML=total>0?s+"-"+e+" / <b>"+total.toLocaleString("ko-KR")+"</b>":"0개";
  var html="";
  html+="<button class='pg-btn' onclick='goPage("+(page-1)+")' "+(page<=1?"disabled":"")+">&#8249;</button>";
  var sp=Math.max(1,page-2),ep=Math.min(pages,sp+4);
  if(ep-sp<4)sp=Math.max(1,ep-4);
  if(sp>1)html+="<button class='pg-btn' onclick='goPage(1)'>1</button>";
  if(sp>2)html+="<span class='pg-dots'>…</span>";
  for(var i=sp;i<=ep;i++)html+="<button class='pg-btn"+(i===page?" on":"")+"' onclick='goPage("+i+")'>"+i+"</button>";
  if(ep<pages-1)html+="<span class='pg-dots'>…</span>";
  if(ep<pages)html+="<button class='pg-btn' onclick='goPage("+pages+")'>"+pages+"</button>";
  html+="<button class='pg-btn' onclick='goPage("+(page+1)+")' "+(page>=pages?"disabled":"")+">&#8250;</button>";
  document.getElementById("pgBtns").innerHTML=html;
}
function goPage(p){var pages=Math.ceil(filtered.length/perPage);if(p<1||p>pages)return;page=p;document.getElementById("tblWrap").scrollTop=0;renderTable();renderPager();}
function setPerPage(){perPage=parseInt(document.getElementById("ppSel").value);page=1;renderTable();renderPager();}
function sortBy(col){
  if(sortCol===col)sortDir=-sortDir;else{sortCol=col;sortDir=1;}
  document.querySelectorAll("th").forEach(function(th){th.classList.remove("asc","desc");});
  var ths=document.querySelectorAll("th");
